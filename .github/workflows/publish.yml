name: publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 0"
  push:
    branches:
      - main

jobs:
  publish-base-docker-image:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build base Docker image Latest
        run: |
               docker build . --tag ghcr.io/integration-glue/glue-docker-base:latest
               docker push ghcr.io/integration-glue/glue-docker-base:latest

      - name: Build base Docker image Next
        run: |
               docker build . -f DockerfileNext --tag ghcr.io/integration-glue/glue-docker-base:next
               docker push ghcr.io/integration-glue/glue-docker-base:next
